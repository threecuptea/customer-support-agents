services:
  custom-support:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Persist checkpoints to the mounted volume for durable execution.
      - CHECKPOINT_DB=/app/data/checkpoints.sqlite
    volumes:
      - ./data:/app/data
    restart: unless-stopped
